[project]
site_name = "gomailer"
site_description = "A Go email library — build MIME messages and send them over SMTP, sendmail, or null with DSN config, middleware, routing, and OTLP."
site_url = "https://shyim.github.io/go-mailer/"
repo_url = "https://github.com/shyim/go-mailer"
repo_name = "shyim/go-mailer"

nav = [
  { "Home" = "index.md" },
  { "Getting started" = [
    "getting-started/index.md",
    { "Installation" = "getting-started/installation.md" },
    { "Quickstart" = "getting-started/quickstart.md" },
    { "Modules" = "getting-started/modules.md" },
  ] },
  { "Concepts" = [
    "concepts/index.md",
    { "Architecture" = "concepts/architecture.md" },
    { "Transports" = "concepts/transports.md" },
    { "Middleware & hooks" = "concepts/middleware.md" },
    { "Errors" = "concepts/errors.md" },
  ] },
  { "Guides" = [
    "guides/index.md",
    { "Sending mail" = "guides/sending-mail.md" },
    { "Amazon SES" = "guides/ses.md" },
    { "DSN configuration" = "guides/dsn.md" },
    { "Observability (OTLP)" = "guides/observability.md" },
    { "Testing" = "guides/testing.md" },
    { "Production" = "guides/production.md" },
  ] },
  { "Reference" = [
    "reference/index.md",
    { "DSN options" = "reference/dsn-options.md" },
  ] },
]

[project.theme]
name = "material"
features = [
  "navigation.sections",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "navigation.footer",
  "content.code.copy",
  "content.code.annotate",
  "search.suggest",
  "search.highlight",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Light/dark palette toggle.
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
